services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: dsar-portal-backend:local
    container_name: dsar-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: dsar-portal-frontend:local
    container_name: dsar-frontend
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_healthy
